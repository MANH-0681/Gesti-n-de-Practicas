<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/public/css/register.css">
  <title>Registro</title>
</head>
<body>
  <header>  
   <div class="izquierda"></div>
</header>

 <main>
    <form id="form-register">

  <h2>CREAR CUENTA</h2>

  <div>
    <label>Primer nombre</label>
    <input type="text" id="first_name">
  </div>

  <div>
    <label>Segundo nombre</label>
    <input type="text" id="middle_name">
  </div>

  <div>
    <label>Apellido</label>
    <input type="text" id="last_name">
  </div>

  <div>
    <label>Segundo apellido</label>
    <input type="text" id="second_last_name">
  </div>

  <div>
    <label>Documento</label>
    <input type="text" id="document_number">
  </div>

  <div>
    <label>Teléfono</label>
    <input type="text" id="cell_phone">
  </div>

  <div class="full">
    <label>Correo</label>
    <input type="email" id="reg-email">
  </div>

  <div>
    <label>Semestre</label>
    <input type="number" id="semester">
  </div>

  <div>
    <label>Dirección</label>
    <input type="text" id="address">
  </div>

  <div>
    <label>Universidad</label>
    <select id="university"></select>
  </div>

  <div>
    <label>Facultad</label>
    <select id="faculty"></select>
  </div>

  <div class="full">
    <label>Carrera</label>
    <select id="career"></select>
  </div>

  <div>
    <label>Contraseña</label>
    <input type="password" id="reg-password">
  </div>

  <div>
    <label>Confirmar</label>
    <input type="password" id="reg-password2">
  </div>

  <button type="submit">Crear cuenta</button>
  <button type="button" onclick="location.href='/public/index.html'">Volver</button>

</form>
    </main>

   <script src="/public/js/register.js"></script>
</body>
</html>
